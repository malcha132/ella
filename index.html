<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeměpisný Kvíz</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #1a73e8; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 1.5rem; font-weight: bold; }
        .question-box { font-size: 1.2rem; margin-bottom: 1.5rem; padding: 1rem; background: #e8f0fe; border-radius: 8px; }
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 6px; background: #1a73e8; color: white; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #1557b0; }
        button.correct { background: #28a745 !important; }
        button.wrong { background: #dc3545 !important; }
        .next-btn { margin-top: 1.5rem; width: 100%; background: #343a40; display: none; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>🌍 Zeměpisný Kvíz</h1>
    <div class="stats">
        <span>Skóre: <span id="score">0</span></span>
        <span>Otázka: <span id="current-q">1</span>/10</span>
    </div>

    <div id="quiz-content">
        <div class="question-box" id="question">Načítám otázku...</div>
        <div class="options" id="options">
            </div>
        <button class="next-btn" id="next-btn" onclick="nextQuestion()">Další otázka ➔</button>
    </div>
</div>

<script>
    // Databáze států
    const countries = [
        { name: "Francie", capital: "Paříž", language: "Francouzština" },
        { name: "Německo", capital: "Berlín", language: "Němčina" },
        { name: "Španělsko", capital: "Madrid", language: "Španělština" },
        { name: "Itálie", capital: "Řím", language: "Italština" },
        { name: "Japonsko", capital: "Tokio", language: "Japonština" },
        { name: "Brazílie", capital: "Brasília", language: "Portugalština" },
        { name: "Egypt", capital: "Káhira", language: "Arabština" },
        { name: "Kanada", capital: "Ottawa", language: "Angličtina / Francouzština" },
        { name: "Austrálie", capital: "Canberra", language: "Angličtina" },
        { name: "Polsko", capital: "Varšava", language: "Polština" }
    ];

    let currentIdx = 0;
    let score = 0;
    let answered = false;

    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const scoreEl = document.getElementById('score');
    const currentQEl = document.getElementById('current-q');
    const nextBtn = document.getElementById('next-btn');

    function initQuiz() {
        // Zamíchat pole zemí na začátku
        countries.sort(() => Math.random() - 0.5);
        showQuestion();
    }

    function showQuestion() {
        answered = false;
        nextBtn.style.display = 'none';
        optionsEl.innerHTML = '';
        
        const country = countries[currentIdx];
        const type = Math.random() > 0.5 ? 'capital' : 'language'; // Střídáme typ otázky
        
        if(type === 'capital') {
            questionEl.innerText = `Jaké je hlavní město státu: ${country.name}?`;
            generateOptions(country.capital, 'capital');
        } else {
            questionEl.innerText = `Jakým jazykem se mluví v zemi: ${country.name}?`;
            generateOptions(country.language, 'language');
        }
        
        currentQEl.innerText = currentIdx + 1;
    }

    function generateOptions(correctAnswer, field) {
        let options = [correctAnswer];
        
        // Vybereme náhodné špatné odpovědi
        while(options.length < 4) {
            let randomCountry = countries[Math.floor(Math.random() * countries.length)];
            let wrongOption = randomCountry[field];
            if(!options.includes(wrongOption)) {
                options.push(wrongOption);
            }
        }

        // Zamíchat možnosti
        options.sort(() => Math.random() - 0.5);

        options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(btn, opt === correctAnswer);
            optionsEl.appendChild(btn);
        });
    }

    function checkAnswer(btn, isCorrect) {
        if(answered) return;
        answered = true;

        if(isCorrect) {
            btn.classList.add('correct');
            score++;
